<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day-1 Homework</title>
    <link rel="stylesheet" href="style.css" />
     <script src="homework.js" defer></script>
  </head>
  <body>
    <h1>Solving the Day 1 Problems</h1>

    <div class="main-div" id="homework-1">
      <p>Print all numbers divisible by 3 and 5 up to N.</p>
      <form id="homework1-form">
        <input type="number" id="homework1-input" placeholder="Enter a number..." />
        <button type="submit" id="homework1-button">Submit</button>
      </form>
      <div id="homework1-div"></div>
    </div>

    <div class="main-div" id="homework-2">
      <p>Find the sum of all odd numbers up to N</p>
      <form id="homework2-form">
        <input type="number" id="homework2-input" placeholder="Enter a number..." />
        <button type="submit" id="homework2-button">Submit</button>
      </form>
      <div id="homework2-div"></div>
    </div>

    <div class="main-div" id="homework-3">
      <p>Print the cubes of numbers from 1 to N</p>
      <form id="homework3-form">
        <input type="number" id="homework3-input" placeholder="Enter a number..." />
        <button type="submit" id="homework3-button">Submit</button>
      </form>
      <div id="homework3-div"></div>
    </div>

    <div class="main-div" id="homework-4">
      <p>Print only the numbers that are both even and perfect squares</p>
      <form id="homework4-form">
        <input type="number" id="homework4-input" placeholder="Enter a number..." />
        <button type="submit" id="homework4-button">Submit</button>
      </form>
      <div id="homework4-div"></div>
    </div>
  </body>
</html>
